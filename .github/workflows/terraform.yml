name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.10.5

jobs:
  # ──────────────────────────────────────────────
  # 1. VPC
  # ──────────────────────────────────────────────
  vpc:
    name: VPC — ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/vpc
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform validate
      - id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true
      - if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### VPC Plan 📝\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``
            });
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  # ──────────────────────────────────────────────
  # 2. EKS Cluster (Needs VPC)
  # ──────────────────────────────────────────────
  eks_cluster:
    name: EKS Cluster — ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    needs: vpc
    defaults:
      run:
        working-directory: terraform/eks-cluster
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform validate
      - id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true
      - if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### EKS Cluster Plan 📝\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``
            });
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  # ──────────────────────────────────────────────
  # 3. RDS (Needs EKS Cluster for Node SG)
  # ──────────────────────────────────────────────
  rds:
    name: RDS — ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    needs: eks_cluster
    defaults:
      run:
        working-directory: terraform/rds
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform validate
      - id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true
      - if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### RDS Plan 📝\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``
            });
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  # ──────────────────────────────────────────────
  # 4. EKS Tools (Needs RDS for DB Credentials)
  # ──────────────────────────────────────────────
  eks_tools:
    name: EKS Tools — ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    needs: rds
    defaults:
      run:
        working-directory: terraform/eks-tools
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform validate
      - id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true
      - if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### EKS Tools Plan 📝\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``
            });
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  # ──────────────────────────────────────────────
  # 5. ECR (Parallel with EKS Cluster to save time)
  # ──────────────────────────────────────────────
  ecr:
    name: ECR — ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    needs: vpc 
    defaults:
      run:
        working-directory: terraform/ecr
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform validate
      - id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true
      - if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### ECR Plan 📝\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``
            });
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

    # ──────────────────────────────────────────────
  # 6. ArgoCD App (Needs EKS Tools — ArgoCD must be installed first)
  # ──────────────────────────────────────────────
  argocd_app:
    name: ArgoCD App — ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    needs: eks_tools
    defaults:
      run:
        working-directory: terraform/argocd-app
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform validate
      - id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true
      - if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### ArgoCD App Plan 📝\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``
            });
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan