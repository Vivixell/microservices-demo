name: Build, Scan and Push

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
  workflow_dispatch:

permissions:
  id-token: write   # Required for AWS OIDC authentication
  contents: write   # Required to commit image tag updates back to the repo
  pull-requests: read # Required for dorny/paths-filter to work on PRs

env:
  AWS_REGION: us-east-1


jobs:
  # ──────────────────────────────────────────────
  # 1. Secret Scanning (Fastest gate, runs first)
  # ──────────────────────────────────────────────
  gitleaks:
    name: Gitleaks — Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # 2. SonarQube (SAST + Code Quality)
  # ──────────────────────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ──────────────────────────────────────────────
  # 3. Detect Changes (Paths Filter for Monorepo)
  # ──────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: sonarqube
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for modified paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend: src/frontend/**
            cartservice: src/cartservice/**
            productcatalogservice: src/productcatalogservice/**
            currencyservice: src/currencyservice/**
            paymentservice: src/paymentservice/**
            shippingservice: src/shippingservice/**
            emailservice: src/emailservice/**
            checkoutservice: src/checkoutservice/**
            recommendationservice: src/recommendationservice/**
            adservice: src/adservice/**
            loadgenerator: src/loadgenerator/**

  # ──────────────────────────────────────────────
  # 4. Build + Trivy + Push (Parallel & Idempotent)
  # ──────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    # CRITICAL: Only run if the array of changed services is NOT empty
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}

    strategy:
      fail-fast: false
      matrix:
        # Dynamically load the JSON array from the detect-changes job
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Check if image exists in ECR (Idempotency)
        id: check-image
        run: |
          if aws ecr describe-images \
            --repository-name online-boutique/${{ matrix.service }} \
            --image-ids imageTag=${{ steps.tag.outputs.IMAGE_TAG }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Image already exists in ECR. Skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🚀 Image not found. Proceeding with build."
          fi

      - name: Set up Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build image (Load for Trivy)
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: false   # Hold the push until Trivy clears it
          load: true    # Load into local daemon so Trivy can scan it
          tags: ${{ steps.login-ecr.outputs.registry }}/online-boutique/${{ matrix.service }}:${{ steps.tag.outputs.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        if: steps.check-image.outputs.exists == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/online-boutique/${{ matrix.service }}:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push to ECR
        # ONLY push if the image didn't exist AND we are on a push or manual dispatch (not a PR)
        if: steps.check-image.outputs.exists == 'false' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/online-boutique/${{ matrix.service }}:${{ steps.tag.outputs.IMAGE_TAG }}

  # ──────────────────────────────────────────────
  # 5. GitOps Update (ArgoCD manifests)
  # ──────────────────────────────────────────────
  update-manifests:
    name: Update Image Tags
    runs-on: ubuntu-latest
    needs: [detect-changes, build-push]
    # ONLY run if there were changes AND it's a merge to main or manual trigger
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ONLY changed image tags in manifests
        env:
          CHANGED_SERVICES: ${{ needs.detect-changes.outputs.services }}
        run: |
          IMAGE_TAG=${{ github.sha }}
          REGISTRY=${{ steps.login-ecr.outputs.registry }}

          # Parse JSON array into bash iterable list
          services=$(echo $CHANGED_SERVICES | jq -r '.[]')

          for service in $services; do
            echo "Updating manifest for: $service"
            sed -i "s|${REGISTRY}/online-boutique/${service}:.*|${REGISTRY}/online-boutique/${service}:${IMAGE_TAG}|g" \
              kubernetes-manifests/*.yaml
          done

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes-manifests/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "ci: update tags for modified services to ${{ github.sha }}"
          git push

